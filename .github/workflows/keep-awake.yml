name: Keep Render Awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint (with cold-start retry)
        run: curl -sS --connect-timeout 30 --max-time 90 --retry 5 --retry-delay 10 --retry-connrefused https://crypto-hub-api.onrender.com/api/v1/health
